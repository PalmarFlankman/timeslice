<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeSlice">
<meta name="theme-color" content="#2f4d33">
<title>TimeSlice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#2f4d33;
  --text:#bfe3b5;
  --dim:#7ba081;
  --timeline:#dcefd2;
  --red:#ff4133;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  color:var(--text);
  position:fixed;inset:0;
  overscroll-behavior:none;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}
#stage{position:absolute;inset:0;touch-action:none;}
#bar{position:absolute;inset:0;display:block;touch-action:none;}

/* DOM overlays */
.overlay{position:absolute;pointer-events:none;}
#dateHead{
  top:env(safe-area-inset-top,0);left:0;right:0;
  padding-top:6px;
  text-align:center;font-size:17px;letter-spacing:2px;font-weight:400;color:var(--dim);
  pointer-events:auto;
}
#dateHead .nav{display:inline-block;padding:6px 12px;color:var(--dim);cursor:pointer;}
#dateHead .nav:active{color:var(--text);}
#dateHead .label{display:inline-block;min-width:150px;}

#hamb{
  position:absolute;
  right:18px;bottom:calc(env(safe-area-inset-bottom,0) + 20px);
  width:46px;height:40px;pointer-events:auto;cursor:pointer;
  display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:6px;
}
#hamb i{display:block;height:0;border-top:2.5px solid var(--dim);border-radius:2px;}
#hamb i:nth-child(1){width:26px;}
#hamb i:nth-child(2){width:18px;}
#hamb i:nth-child(3){width:26px;}
#hamb:active i{border-color:var(--text);}

/* settings sheet */
#sheet{
  position:absolute;left:0;right:0;bottom:0;
  background:rgba(20,38,24,0.97);
  border-top:1px solid rgba(191,227,181,0.2);
  border-radius:18px 18px 0 0;
  padding:20px 22px calc(env(safe-area-inset-bottom,0) + 28px);
  transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  z-index:10;
}
#sheet.open{transform:translateY(0);}
#sheet h2{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:500;margin-bottom:14px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid rgba(191,227,181,0.12);font-size:15px;}
.row:first-of-type{border-top:none;}
.row .sub{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4;}
.toggle{width:48px;height:28px;border-radius:14px;background:rgba(191,227,181,0.18);position:relative;flex-shrink:0;cursor:pointer;transition:background .2s;}
.toggle.on{background:#7fc98a;}
.toggle b{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--timeline);transition:left .2s;}
.toggle.on b{left:23px;}
.ghostbtn{font-family:inherit;font-size:14px;color:var(--text);background:none;border:none;cursor:pointer;padding:0;}
.ghostbtn:active{color:var(--dim);}
.muted{color:var(--dim);font-size:13px;}
#sheetClose{position:absolute;top:16px;right:20px;font-size:20px;color:var(--dim);cursor:pointer;line-height:1;}

/* desktop zoom buttons — frameless +/- aligned with the date text line */
#zoom{position:absolute;left:14px;top:calc(env(safe-area-inset-top,0) + 2px);display:flex;gap:14px;pointer-events:auto;z-index:5;}
#zoom button{font-family:inherit;font-size:26px;line-height:26px;height:26px;color:var(--dim);background:none;border:none;cursor:pointer;padding:0;}
#zoom button:active{color:var(--text);}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bar"></canvas>
</div>

<div id="dateHead" class="overlay">
  <span class="nav" id="prevDay">&lt;</span><span class="label" id="dateLabel">—</span><span class="nav" id="nextDay">&gt;</span>
</div>

<div id="hamb"><i></i><i></i><i></i></div>

<div id="zoom">
  <button id="zoomOut" aria-label="Zoom out">&minus;</button>
  <button id="zoomIn" aria-label="Zoom in">+</button>
</div>

<div id="sheet">
  <span id="sheetClose">&times;</span>
  <h2>TimeSlice</h2>
  <div class="row">
    <div>Minimal mode<div class="sub">Hide ticks, time labels &amp; event labels</div></div>
    <div class="toggle" id="tglMinimal"><b></b></div>
  </div>
  <div class="row">
    <div>Reset to now<div class="sub">Reattach the slice line to the current time</div></div>
    <button class="ghostbtn" id="btnReset">Reset</button>
  </div>
  <div class="row">
    <div>Clear today's slices<div class="sub">Remove every anchor on this day</div></div>
    <button class="ghostbtn" id="btnClear">Clear</button>
  </div>
  <div class="row">
    <div>Export day<div class="sub">Coming next — writes intervals to your calendar</div></div>
    <span class="muted">soon</span>
  </div>
  <div class="row">
    <div>Colors &amp; calendars<div class="sub">Coming next</div></div>
    <span class="muted">soon</span>
  </div>
</div>

<script>
/* ============================================================
   TimeSlice v0.1 — core time bar
   The day is measured in minutes from midnight: 0 .. 1440.
   ============================================================ */

const cv = document.getElementById('bar');
const ctx = cv.getContext('2d');

const COLORS = {
  bg:       '#2f4d33',
  ghost:    'rgba(186,222,176,0.16)', // bare interval pill
  ghostGap: 'rgba(186,222,176,0.05)',
  tick:     'rgba(186,222,176,0.30)',
  tickMin:  'rgba(186,222,176,0.16)',
  label:    '#7ba081',
  text:     '#bfe3b5',
  timeline: '#dcefd2',  // solid "now" line
  slice:    '#cfe8c5',  // the movable slice cursor line
  red:      '#ff4133'
};

/* ---------- persistent-ish state ---------- */
const DAY_MIN = 1440;
const MIN_SPAN = 240;     // 4-hour max zoom
const SNAP_MIN = 5;       // round dragging to 5-minute steps
const SNAP_PX  = 14;      // pixel distance to snap onto an anchor / now

const state = {
  date: new Date(),
  winStart: 0,            // visible window top (minutes)
  winEnd: DAY_MIN,        // visible window bottom (minutes)
  anchorsByDay: {},       // 'YYYY-MM-DD' -> sorted array of minutes
  sliceTime: null,        // minutes; null = follows current time
  detached: false,        // true once the user has dragged the slice line away
  snappedNow: false,      // slice line currently snapped onto the now time-line
  dragDot: null,          // {time, until} red handle that lingers after a drag
  minimal: false,
  flashStart: 0           // timestamp of last slice flash
};

function dayKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function anchors(){ const k=dayKey(state.date); return state.anchorsByDay[k] || (state.anchorsByDay[k]=[]); }
function isToday(){ const n=new Date(); return n.getFullYear()===state.date.getFullYear()&&n.getMonth()===state.date.getMonth()&&n.getDate()===state.date.getDate(); }

/* ---------- storage ---------- */
function save(){
  try{
    localStorage.setItem('ts_state', JSON.stringify({
      anchorsByDay: state.anchorsByDay,
      winStart: state.winStart, winEnd: state.winEnd,
      minimal: state.minimal
    }));
  }catch(e){}
}
function load(){
  try{
    const s = JSON.parse(localStorage.getItem('ts_state')||'{}');
    if(s.anchorsByDay) state.anchorsByDay = s.anchorsByDay;
    if(typeof s.winStart==='number') state.winStart = s.winStart;
    if(typeof s.winEnd==='number') state.winEnd = s.winEnd;
    if(typeof s.minimal==='boolean') state.minimal = s.minimal;
  }catch(e){}
}

/* ---------- geometry ---------- */
let W=0,H=0,dpr=1;
let barTop=0, barBot=0, barX=0, barW=20;
function layout(){
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  barX   = W*0.30 - 16;
  barW   = 20;
  // date header: center it in the space to the right of the bar
  const dh = document.getElementById('dateHead');
  dh.style.left  = (barX + barW + 8) + 'px';
  dh.style.right = '0px';
  // anchor the bar below the actual rendered header (robust across browsers),
  // with a top minimum that leaves room for the zoom buttons
  const r = dh.getBoundingClientRect();
  barTop = Math.max(r.bottom + 18, r.top + 84);
  barBot = H - 96;
}
window.addEventListener('resize', ()=>{ layout(); });

function timeToY(t){ return barTop + (t-state.winStart)/(state.winEnd-state.winStart)*(barBot-barTop); }
function yToTime(y){ return state.winStart + (y-barTop)/(barBot-barTop)*(state.winEnd-state.winStart); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

function currentMinutes(){
  const n = new Date();
  return n.getHours()*60 + n.getMinutes() + n.getSeconds()/60;
}
function effSliceTime(){
  if(state.detached && state.sliceTime!=null) return state.sliceTime;
  return isToday() ? currentMinutes() : (state.sliceTime!=null?state.sliceTime:DAY_MIN/2);
}

/* ---------- formatting ---------- */
function fmt12(mins){
  let m = ((Math.round(mins)%DAY_MIN)+DAY_MIN)%DAY_MIN;
  const h = Math.floor(m/60), mm = m%60;
  const ap = h<12?'AM':'PM'; let h12 = h%12; if(h12===0) h12=12;
  return { hm: h12+':'+String(mm).padStart(2,'0'), ap };
}
function fmtCornerLine(mins){
  const p = fmt12(mins);
  return p.hm+' '+p.ap;
}
function fmtDate(d){
  const wd = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
  const mo = d.toLocaleDateString('en-US',{month:'short'}).toUpperCase();
  return wd+' '+mo+' '+d.getDate();
}

/* ---------- drawing ---------- */
function roundRect(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // segments of the whole day, split by anchors
  const a = anchors();
  const bounds = [0, ...a, DAY_MIN];

  // pills (clip to bar region)
  ctx.save();
  ctx.beginPath();
  ctx.rect(barX-barW, barTop-30, barW*2, (barBot-barTop)+60);
  ctx.clip();
  for(let i=0;i<bounds.length-1;i++){
    const s=bounds[i], e=bounds[i+1];
    let y0=timeToY(s), y1=timeToY(e);
    if(y1<barTop-30 || y0>barBot+30) continue;
    const gap = 3;
    const top = y0+gap, h = (y1-gap)-(top);
    if(h<=0) continue;
    ctx.fillStyle = COLORS.ghost;
    roundRect(barX-barW/2, top, barW, h, barW/2);
    ctx.fill();
  }
  ctx.restore();

  // ticks (hour marks) — hidden in minimal mode
  if(!state.minimal){
    const startH = Math.ceil(state.winStart/60);
    const endH   = Math.floor(state.winEnd/60);
    for(let h=startH;h<=endH;h++){
      const y = timeToY(h*60);
      if(y<barTop-1||y>barBot+1) continue;
      const major = (h%6===0);
      ctx.strokeStyle = major?COLORS.tick:COLORS.tickMin;
      ctx.lineWidth = major?2:1.5;
      const len = major?18:12;
      ctx.beginPath();
      ctx.moveTo(W*0.09, y);
      ctx.lineTo(W*0.09+len, y);
      ctx.stroke();
      // hour number at the 3-hour marks (3,6,9,12,3,6,9) — skip midnight ends
      if(h%3===0 && h!==0 && h!==24){
        let h12 = h%12; if(h12===0) h12=12;
        ctx.fillStyle = COLORS.tick;
        ctx.font = '300 13px "IBM Plex Mono",monospace';
        ctx.textAlign = 'left';
        ctx.fillText(String(h12), 16, y+4);
      }
    }
  }

  // corner time labels (top & bottom of bar) — single line, clear of the ticks
  if(!state.minimal){
    ctx.fillStyle = COLORS.label;
    ctx.font = '300 13px "IBM Plex Mono",monospace';
    ctx.textAlign = 'left';
    ctx.fillText(fmtCornerLine(state.winStart), 16, barTop-11);
    ctx.fillText(fmtCornerLine(state.winEnd),   16, barBot+21);
  }

  const slice = effSliceTime();
  const sliceY = clamp(timeToY(slice), barTop, barBot);
  const atNow = (!state.detached) || state.snappedNow;

  // time-line (current time) — only when the slice line is detached away from now
  if(state.detached && !state.snappedNow && isToday()){
    const ny = timeToY(currentMinutes());
    if(ny>=barTop && ny<=barBot){
      ctx.strokeStyle = COLORS.timeline;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(barX-16, ny); ctx.lineTo(barX+16, ny); ctx.stroke();
      // current time, in the hash column, on an opaque frame that masks the ticks
      if(!state.minimal){
        ctx.font = '300 13px "IBM Plex Mono",monospace';
        ctx.textAlign = 'left';
        const txt = fmtCornerLine(currentMinutes());
        const tw = ctx.measureText(txt).width;
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(12, ny-9, tw+8, 18);
        ctx.fillStyle = COLORS.timeline;
        ctx.fillText(txt, 16, ny+4);
      }
    }
  }

  // the slice cursor line (solid at now, dashed when detached elsewhere), 1px, clear of the hashes
  const flashing = (performance.now()-state.flashStart) < 1000;
  let lineColor = COLORS.slice;
  if(flashing){
    const ft = (performance.now()-state.flashStart)/1000;
    const k = ft<0.5 ? 1 : 1-((ft-0.5)/0.5);
    lineColor = mix(COLORS.slice, COLORS.red, k);
  }
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1;
  ctx.setLineDash(atNow ? [] : [7,7]);
  ctx.beginPath(); ctx.moveTo(hashRight(), sliceY); ctx.lineTo(W*0.97, sliceY); ctx.stroke();
  ctx.setLineDash([]);

  // drag dot — lingers ~2s after release so it can be grabbed to move the anchor
  if(state.dragDot && performance.now() < state.dragDot.until){
    const dy = timeToY(state.dragDot.time);
    if(dy>=barTop && dy<=barBot){
      ctx.fillStyle = COLORS.red;
      ctx.beginPath(); ctx.arc(barX, dy, 6, 0, Math.PI*2); ctx.fill();
    }
  }

  // big time + small AM/PM + word; time digits and word share one right edge
  const tp = fmt12(slice);
  const RE = W*0.90;
  ctx.fillStyle = COLORS.text;
  ctx.textAlign = 'right';
  ctx.font = '400 44px "IBM Plex Mono",monospace';
  ctx.fillText(tp.hm, RE, sliceY-14);
  ctx.font = '400 40px "IBM Plex Mono",monospace';
  ctx.fillText(state.dragging?'drag':'slice', RE, sliceY+38);
  ctx.textAlign = 'left';
  ctx.font = '400 14px "IBM Plex Mono",monospace';
  ctx.fillText(tp.ap, RE + 5, sliceY-30);
}

function mix(a,b,k){
  const pa=parseHex(a), pb=parseHex(b);
  const r=Math.round(pa[0]+(pb[0]-pa[0])*k);
  const g=Math.round(pa[1]+(pb[1]-pa[1])*k);
  const bl=Math.round(pa[2]+(pb[2]-pa[2])*k);
  return 'rgb('+r+','+g+','+bl+')';
}
function parseHex(h){
  if(h[0]==='#'){const n=parseInt(h.slice(1),16);return [(n>>16)&255,(n>>8)&255,n&255];}
  const m=h.match(/\d+/g); return [+m[0],+m[1],+m[2]];
}

/* ---------- snapping ---------- */
function nearestAnchor(t){
  const ty = timeToY(t);
  let best=null, bestPx=SNAP_PX;
  for(const c of anchors()){
    const px = Math.abs(timeToY(c)-ty);
    if(px<bestPx){ bestPx=px; best=c; }
  }
  return best;
}

/* ---------- pointer / gestures ---------- */
const DRAG_OFFSET = 34;      // slice line sits above the finger so the word 'slice' is under it
const DOT_HOLD = 2000;       // ms the drag dot lingers after release
const pointers = new Map();
let gesture = null;          // 'drag' | 'anchordrag' | 'pinch' | 'scroll' | null
let downInfo = null;
let pinchStart = null;
let scrollStart = null;
let anchorIdx = -1;          // index of the anchor being dragged

function hashRight(){ return W*0.09 + 22; }   // right edge of the tick column

const stage = document.getElementById('stage');

function doScroll(e){
  const span = state.winEnd - state.winStart;
  let ws = clamp(scrollStart.winStart - (e.clientY - scrollStart.y)/(barBot-barTop)*span, 0, DAY_MIN-span);
  state.winStart = ws; state.winEnd = ws+span;
}
function dotActive(){ return state.dragDot && performance.now() < state.dragDot.until; }

stage.addEventListener('pointerdown', e=>{
  stage.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(pointers.size===2){
    const pts = [...pointers.values()];
    const dist = Math.abs(pts[0].y - pts[1].y) || 1;
    const midY = (pts[0].y + pts[1].y)/2;
    pinchStart = { dist, span: state.winEnd-state.winStart, midTime: yToTime(midY), midY };
    gesture = 'pinch'; state.dragging = false; downInfo = null; scrollStart = null;
    return;
  }

  const x=e.clientX, y=e.clientY;

  // grab the lingering drag dot to move that anchor
  if(dotActive()){
    const dy = timeToY(state.dragDot.time);
    if(Math.hypot(x-barX, y-dy) <= 30){
      anchorIdx = anchors().findIndex(a=>Math.abs(a-state.dragDot.time)<0.6);
      if(anchorIdx>=0){ downInfo = { x, y, t:performance.now(), moved:false, mode:'anchor' }; gesture=null; return; }
    }
  }

  const sy = clamp(timeToY(effSliceTime()), barTop, barBot);
  const onSliceRow = Math.abs(y - sy) <= 44 && x > hashRight();
  const nowY = (state.detached && !state.snappedNow && isToday()) ? timeToY(currentMinutes()) : null;
  const onNowLine = nowY!=null && Math.abs(y - nowY) <= 18 && x < W*0.62;

  if(onSliceRow){
    downInfo = { x, y, t:performance.now(), moved:false, mode:'slice' }; gesture = null;
  } else if(onNowLine){
    downInfo = { x, y, t:performance.now(), moved:false, mode:'nowline' };
    scrollStart = { y:e.clientY, winStart:state.winStart }; gesture = null;
  } else {
    // dragging anywhere else scrolls the time window
    gesture = 'scroll'; scrollStart = { y:e.clientY, winStart:state.winStart }; downInfo = null;
  }
}, {passive:false});

stage.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  pointers.get(e.pointerId).x = e.clientX;
  pointers.get(e.pointerId).y = e.clientY;
  e.preventDefault();

  if(gesture==='pinch' && pointers.size>=2){
    const pts = [...pointers.values()];
    const dist = Math.abs(pts[0].y - pts[1].y) || 1;
    let span = clamp(pinchStart.span * (pinchStart.dist / dist), MIN_SPAN, DAY_MIN);
    const frac = (pinchStart.midY - barTop)/(barBot-barTop);
    let ws = clamp(pinchStart.midTime - frac*span, 0, DAY_MIN-span);
    state.winStart = ws; state.winEnd = ws+span;
    return;
  }

  if(gesture==='scroll' && scrollStart){ doScroll(e); return; }

  if(downInfo){
    const dist = Math.hypot(e.clientX-downInfo.x, e.clientY-downInfo.y);

    if(downInfo.mode==='nowline'){
      if(!downInfo.moved && dist>6){ downInfo.moved=true; gesture='scroll'; }
      if(gesture==='scroll') doScroll(e);
      return;
    }

    if(downInfo.mode==='anchor'){
      if(!downInfo.moved && dist>6){ downInfo.moved=true; gesture='anchordrag'; state.dragging=true; }
      if(gesture==='anchordrag'){
        const a = anchors();
        const ay = clamp(e.clientY, barTop, barBot);
        let t = Math.round(yToTime(ay)/SNAP_MIN)*SNAP_MIN;
        const lo = (anchorIdx>0 ? a[anchorIdx-1] : 0) + SNAP_MIN;
        const hi = (anchorIdx<a.length-1 ? a[anchorIdx+1] : DAY_MIN) - SNAP_MIN;
        t = clamp(t, lo, hi);
        a[anchorIdx] = t;
        state.detached = true; state.snappedNow = false; state.sliceTime = t;
        state.dragDot = { time: t, until: performance.now()+DOT_HOLD };
      }
      return;
    }

    // mode 'slice'
    if(!downInfo.moved && dist>6){ downInfo.moved=true; gesture='drag'; state.dragging=true; state.detached=true; }
    if(gesture==='drag'){
      const span = state.winEnd - state.winStart;
      const lineY = e.clientY - DRAG_OFFSET;       // keep the word 'slice' under the finger
      if(lineY < barTop){
        let ws = clamp(state.winStart - (barTop-lineY)*0.4*(span/(barBot-barTop)), 0, DAY_MIN-span);
        state.winStart = ws; state.winEnd = ws+span;
      } else if(lineY > barBot){
        let ws = clamp(state.winStart + (lineY-barBot)*0.4*(span/(barBot-barTop)), 0, DAY_MIN-span);
        state.winStart = ws; state.winEnd = ws+span;
      }
      const ay = clamp(lineY, barTop, barBot);
      const t = yToTime(ay);
      const nowM = isToday() ? currentMinutes() : null;
      if(nowM!=null && Math.abs(timeToY(nowM)-ay) <= SNAP_PX){
        state.snappedNow = true; state.sliceTime = nowM;     // snapped onto the time-line
      } else {
        state.snappedNow = false;
        const snap = nearestAnchor(t);
        state.sliceTime = (snap!=null) ? snap : Math.round(t/SNAP_MIN)*SNAP_MIN;
      }
      state.sliceTime = clamp(state.sliceTime, 0, DAY_MIN);
      // sitting on an anchor → arm the drag dot
      const onA = nearestAnchor(state.sliceTime);
      if(onA!=null && Math.abs(onA-state.sliceTime)<0.6 && !state.snappedNow){
        state.dragDot = { time: onA, until: performance.now()+DOT_HOLD };
      }
    }
  }
}, {passive:false});

function endPointer(e){
  if(pointers.has(e.pointerId)) pointers.delete(e.pointerId);

  if(gesture==='pinch'){
    if(pointers.size<2){
      gesture=null; pinchStart=null;
      const sy = timeToY(effSliceTime());
      if(sy<barTop || sy>barBot){
        const span = state.winEnd-state.winStart;
        let ws = clamp(effSliceTime()-span/2, 0, DAY_MIN-span);
        state.winStart=ws; state.winEnd=ws+span;
      }
      save();
    }
    return;
  }

  if(gesture==='scroll'){ save(); state.dragging=false; gesture=null; downInfo=null; scrollStart=null; return; }

  if(gesture==='anchordrag'){
    anchors().sort((p,q)=>p-q);
    if(state.dragDot) state.dragDot.until = performance.now()+DOT_HOLD;
    save(); state.dragging=false; gesture=null; downInfo=null; anchorIdx=-1; return;
  }

  if(downInfo && !downInfo.moved){
    if(downInfo.mode==='nowline'){
      state.detached=false; state.sliceTime=null; state.snappedNow=false;   // tap time-line → reattach
    } else if(downInfo.mode==='slice'){
      doSlice();
    }
  }

  if(gesture==='drag'){
    if(state.snappedNow){ state.detached=false; state.sliceTime=null; }              // released at now → follow now
    else if(state.dragDot){ state.dragDot.until = performance.now()+DOT_HOLD; }      // linger so dot is grabbable
    state.snappedNow=false;
    save();
  }

  state.dragging=false; gesture=null; downInfo=null; scrollStart=null;
}
stage.addEventListener('pointerup', endPointer, {passive:false});
stage.addEventListener('pointercancel', endPointer, {passive:false});

function doSlice(){
  const t = Math.round(effSliceTime()/SNAP_MIN)*SNAP_MIN;
  if(t<=0 || t>=DAY_MIN) { state.flashStart = performance.now(); return; }
  const a = anchors();
  if(!a.some(x=>Math.abs(x-t)<1)){ a.push(t); a.sort((p,q)=>p-q); }
  state.flashStart = performance.now();
  save();
}

/* ---------- date nav ---------- */
function setDate(d){
  state.date = d;
  state.detached = false; state.sliceTime = null;
  updateDateLabel();
  save();
}
function updateDateLabel(){ document.getElementById('dateLabel').textContent = fmtDate(state.date); }
document.getElementById('prevDay').addEventListener('click', ()=>{ const d=new Date(state.date); d.setDate(d.getDate()-1); setDate(d); });
document.getElementById('nextDay').addEventListener('click', ()=>{ const d=new Date(state.date); d.setDate(d.getDate()+1); setDate(d); });

/* ---------- settings sheet ---------- */
const sheet = document.getElementById('sheet');
document.getElementById('hamb').addEventListener('click', ()=>{ syncToggles(); sheet.classList.add('open'); });
document.getElementById('sheetClose').addEventListener('click', ()=> sheet.classList.remove('open'));
function syncToggles(){ document.getElementById('tglMinimal').classList.toggle('on', state.minimal); }
document.getElementById('tglMinimal').addEventListener('click', ()=>{ state.minimal=!state.minimal; syncToggles(); save(); });
document.getElementById('btnReset').addEventListener('click', ()=>{ state.detached=false; state.sliceTime=null; state.snappedNow=false; sheet.classList.remove('open'); });
document.getElementById('btnClear').addEventListener('click', ()=>{ state.anchorsByDay[dayKey(state.date)]=[]; save(); sheet.classList.remove('open'); });

/* ---------- zoom control (desktop) ---------- */
function zoomBy(f){
  const center = (state.winStart+state.winEnd)/2;
  let span = clamp((state.winEnd-state.winStart)*f, MIN_SPAN, DAY_MIN);
  let ws = clamp(center - span/2, 0, DAY_MIN-span);
  state.winStart = ws; state.winEnd = ws+span; save();
}
document.getElementById('zoomIn').addEventListener('click', ()=> zoomBy(0.7));
document.getElementById('zoomOut').addEventListener('click', ()=> zoomBy(1/0.7));

/* ---------- boot ---------- */
load();
layout();
updateDateLabel();
document.body.style.background = COLORS.bg;
(function loop(){ draw(); requestAnimationFrame(loop); })();
</script>
</body>

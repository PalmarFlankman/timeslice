<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TimeSlice">
<meta name="theme-color" content="#0d2117">
<title>TimeSlice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d2117;
  --text:#bfe3b5;
  --dim:#7ba081;
  --timeline:#dcefd2;
  --red:#ff4133;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  color:var(--text);
  position:fixed;inset:0;
  overscroll-behavior:none;
  touch-action:none;
  -webkit-user-select:none;user-select:none;
}
#stage{position:fixed;top:0;left:50%;transform:translateX(-50%);width:min(100vw,480px);height:100vh;height:100dvh;overflow:hidden;touch-action:none;}
#bar{position:absolute;inset:0;display:block;touch-action:none;}

/* DOM overlays */
.overlay{position:absolute;pointer-events:none;}
#dateHead{
  top:env(safe-area-inset-top,0);left:0;right:0;
  padding-top:6px;
  text-align:center;font-size:17px;letter-spacing:2px;font-weight:400;color:var(--dim);
  pointer-events:auto;
}
#dateHead .nav{display:inline-block;padding:6px 12px;color:var(--dim);cursor:pointer;}
#dateHead .nav:active{color:var(--text);}
#dateHead .label{display:inline-block;min-width:150px;}

#hamb{
  position:absolute;
  right:16px;bottom:calc(env(safe-area-inset-bottom,0) + 10px);
  width:46px;height:36px;pointer-events:auto;cursor:pointer;
  display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:6px;
}
#hamb i{display:block;height:0;border-top:2.5px solid var(--dim);border-radius:2px;}
#hamb i:nth-child(1){width:26px;}
#hamb i:nth-child(2){width:26px;}
#hamb i:nth-child(3){width:26px;}
#hamb:active i{border-color:var(--text);}

/* settings sheet */
#sheet{
  position:absolute;left:0;right:0;bottom:0;
  background:rgba(20,44,30,0.97);
  border-top:1px solid rgba(191,227,181,0.2);
  border-radius:18px 18px 0 0;
  padding:20px 22px calc(env(safe-area-inset-bottom,0) + 28px);
  transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
  z-index:10;
}
#sheet.open{transform:translateY(0);}
#sheet h2{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:500;margin-bottom:14px;}
#sheet h2 .ver{text-transform:none;letter-spacing:1px;font-weight:400;color:var(--dim);opacity:0.7;margin-left:8px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid rgba(191,227,181,0.12);font-size:15px;}
.row:first-of-type{border-top:none;}
.row .sub{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4;}
.toggle{width:48px;height:28px;border-radius:14px;background:rgba(191,227,181,0.18);position:relative;flex-shrink:0;cursor:pointer;transition:background .2s;}
.toggle.on{background:#7fc98a;}
.toggle b{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--timeline);transition:left .2s;}
.toggle.on b{left:23px;}
.ghostbtn{font-family:inherit;font-size:14px;color:var(--text);background:none;border:none;cursor:pointer;padding:0;}
.ghostbtn:active{color:var(--dim);}
.muted{color:var(--dim);font-size:13px;}
#sheetClose{position:absolute;top:16px;right:20px;font-size:20px;color:var(--dim);cursor:pointer;line-height:1;}

/* desktop zoom buttons — frameless +/- aligned with the date text line */
#zoom{position:absolute;left:14px;top:calc(env(safe-area-inset-top,0) + 6px);display:flex;gap:16px;pointer-events:auto;z-index:5;}
#zoom button{font-family:inherit;font-size:22px;line-height:22px;height:22px;color:var(--dim);background:none;border:none;cursor:pointer;padding:0;}
#zoom button:active{color:var(--text);}

/* event editor */
#editorBack{position:absolute;inset:0;background:rgba(0,0,0,0.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;}
#editorBack.open{opacity:1;pointer-events:auto;}
#editor{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.96);width:min(360px,90%);
  background:rgba(20,44,30,0.99);border:1px solid rgba(191,227,181,0.22);border-radius:18px;
  padding:22px 22px 20px;z-index:21;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
  max-height:86%;overflow:auto;}
#editor.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
#edClose{position:absolute;top:12px;right:18px;font-size:20px;color:var(--dim);cursor:pointer;line-height:1;}
#edTime{font-size:16px;color:var(--text);margin-bottom:14px;letter-spacing:1px;}
#editor label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin:12px 0 5px;}
#editor input,#editor select,#editor textarea{width:100%;font-family:inherit;font-size:15px;color:var(--text);
  background:rgba(13,33,23,0.9);border:1px solid rgba(191,227,181,0.22);border-radius:9px;padding:9px 10px;outline:none;-webkit-appearance:none;appearance:none;}
#editor input:focus,#editor select:focus,#editor textarea:focus{border-color:#7fc98a;}
#edTitle{margin-bottom:2px;}
#edPreview{margin-top:14px;font-size:13px;color:#cfe8c5;word-break:break-all;min-height:18px;white-space:pre-wrap;}
#edBtns{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
#edSave{font-family:inherit;font-size:15px;color:#0d2117;background:#aede5c;border:none;border-radius:9px;padding:9px 22px;cursor:pointer;}
#edSave:active{background:#9bcf4a;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="bar"></canvas>
  <div id="dateHead" class="overlay">
    <span class="nav" id="prevDay">&lt;</span><span class="label" id="dateLabel">—</span><span class="nav" id="nextDay">&gt;</span>
  </div>
  <div id="hamb"><i></i><i></i><i></i></div>
  <div id="zoom">
    <button id="zoomOut" aria-label="Zoom out">&minus;</button>
    <button id="zoomIn" aria-label="Zoom in">+</button>
  </div>

  <div id="sheet">
    <span id="sheetClose">&times;</span>
    <h2>TimeSlice<span class="ver">v1.10</span></h2>
    <div class="row">
      <div>Minimal mode<div class="sub">Hide ticks, time labels &amp; event labels</div></div>
      <div class="toggle" id="tglMinimal"><b></b></div>
    </div>
    <div class="row">
      <div>Reset to now<div class="sub">Reattach the slice line to the current time</div></div>
      <button class="ghostbtn" id="btnReset">Reset</button>
    </div>
    <div class="row">
      <div>Clear today's slices<div class="sub">Remove every anchor on this day</div></div>
      <button class="ghostbtn" id="btnClear">Clear</button>
    </div>
    <div class="row">
      <div>Export day<div class="sub">Coming next — writes intervals to your calendar</div></div>
      <span class="muted">soon</span>
    </div>
    <div class="row">
      <div>Colors &amp; calendars<div class="sub">Coming next</div></div>
      <span class="muted">soon</span>
    </div>
  </div>

  <div id="editorBack"></div>
  <div id="editor">
    <span id="edClose">&times;</span>
    <div id="edTime">—</div>
    <input id="edTitle" type="text" placeholder="event title" autocomplete="off">
    <label>Calendar</label>
    <select id="edDiv"></select>
    <label>Category</label>
    <select id="edCat"></select>
    <label>Sub-category</label>
    <select id="edSub"></select>
    <label>Note</label>
    <textarea id="edNote" rows="2" placeholder="note"></textarea>
    <div id="edPreview"></div>
    <div id="edBtns">
      <button id="edDelete" class="ghostbtn">Delete</button>
      <button id="edSave">Save</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   TimeSlice v0.1 — core time bar
   The day is measured in minutes from midnight: 0 .. 1440.
   ============================================================ */

const cv = document.getElementById('bar');
const ctx = cv.getContext('2d');

const COLORS = {
  bg:       '#0d2117',
  ghost:    'rgba(186,222,176,0.20)', // bare interval pill
  ghostGap: 'rgba(186,222,176,0.05)',
  tick:     'rgba(186,222,176,0.30)',
  tickMin:  'rgba(186,222,176,0.16)',
  label:    '#7ba081',
  text:     '#bfe3b5',
  timeline: '#dcefd2',  // solid "now" line
  flame:    '#ff5630',  // flame red (TimeTrap hot-button) for the time-line + current time
  slice:    '#cfe8c5',  // the movable slice cursor line
  red:      '#ff4133'
};

/* ---------- config (defaults; later synced from desktop TimeTrap) ---------- */
const CONFIG = {
  divisions: [
    { name:'Admin',     calId:'_Admin',                 prefix:'#AD-', color:'#7fb0e8', tree:[
      { cat:'Deskwork',  subs:['Email & Bills','Focused Admin','ORKID','Shopping Online','Timesheet'] },
      { cat:'Planning',  subs:['Family Calendar','ORKID','Trips','Vermont'] },
      { cat:'Admin',     subs:['Focused Admin'] },
      { cat:'Housethink',subs:['Shopping Online'] }
    ]},
    { name:'Personal',  calId:'_Personal',              prefix:'#EP-', color:'#d9c14a', tree:[
      { cat:'Argue',       subs:[] },
      { cat:'Self',        subs:['Routine - Bedtime','Fitness','Meal'] },
      { cat:'Family Time', subs:[] },
      { cat:'Social',      subs:['Friend','K','Party / Event','Phonecall'] },
      { cat:'Project',     subs:['ORKID-TimeTrap'] }
    ]},
    { name:'Household', calId:'_Housework & Childcare', prefix:'#CH-', color:'#aede5c', tree:[
      { cat:'Childcare', subs:['Activities','Afterschool','Appointment','Routine - Bedtime','Routine - Evening','Event','Routine - Morning','Pool','Schoolwork & Practice','Unstructured'] },
      { cat:'Housework', subs:['Afterschool','Clean & Pickup','Cooking','Errand','Laundry','Pack & Unpack','Repair & Construction'] },
      { cat:'Driving',   subs:['Trip'] }
    ]},
    { name:'Projects',  calId:'_Projects',              prefix:'#PR-', color:'#5fc0a8', tree:[
      { cat:'VT3',  subs:['Design'] },
      { cat:'618',  subs:['Financial'] },
      { cat:'11FR', subs:['Financial'] }
    ]}
  ]
};

// slug() — MUST match desktop exactly so tags re-import cleanly
function slug(s){ return (s||'').trim().replace(/^#/,'').replace(/\s+/g,'-').replace(/[^\w-]/g,''); }
function buildTag(divIdx, cat, sub){
  const d = CONFIG.divisions[divIdx]; if(!d) return '';
  let t = d.prefix + slug(cat);
  if(sub) t += '/' + slug(sub);
  return t;
}
function divByName(n){ return CONFIG.divisions.findIndex(d=>d.name===n); }

/* ---------- persistent-ish state ---------- */
const DAY_MIN = 1440;
const MIN_SPAN = 240;     // 4-hour max zoom
const SNAP_MIN = 5;       // round dragging to 5-minute steps
const SNAP_PX  = 14;      // pixel distance to snap onto an anchor / now

const state = {
  date: new Date(),
  winStart: 0,            // visible window top (minutes)
  winEnd: DAY_MIN,        // visible window bottom (minutes)
  anchorsByDay: {},       // (legacy, kept only for migration)
  eventsByDay: {},        // (legacy, kept only for migration)
  segsByDay: {},          // 'YYYY-MM-DD' -> [ {start,end,ev} ] contiguous over 0..1440
  sliceTime: null,        // minutes; null = follows current time
  detached: false,        // true once the user has dragged the slice line away
  snappedNow: false,      // slice line currently snapped onto the now time-line
  dragDot: null,          // {time, until} red handle that lingers after a drag
  minimal: false,
  flashStart: 0           // timestamp of last slice flash
};

function dayKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isToday(){ const n=new Date(); return n.getFullYear()===state.date.getFullYear()&&n.getMonth()===state.date.getMonth()&&n.getDate()===state.date.getDate(); }

/* ---------- segment model ----------
   A day is a contiguous list of segments covering 0..1440. Each segment may carry an event.
   Anchors are simply the internal boundaries between segments. Moving/deleting a boundary
   reshapes segments while their event data rides along. */
function daySegs(){ const k=dayKey(state.date); let d=state.segsByDay[k]; if(!d){ d=[{start:0,end:DAY_MIN,ev:null}]; state.segsByDay[k]=d; } return d; }
function anchorTimes(){ return daySegs().slice(1).map(s=>s.start); }
function segIndexAt(t){ const segs=daySegs(); for(let i=0;i<segs.length;i++){ if(t>=segs[i].start && t<segs[i].end) return i; } return segs.length-1; }
function boundaryNear(t){ const segs=daySegs(); for(let i=1;i<segs.length;i++){ if(Math.abs(segs[i].start-t)<0.6) return i; } return -1; }

function sliceAt(t){
  t = Math.round(t/SNAP_MIN)*SNAP_MIN;
  if(t<=0 || t>=DAY_MIN) return false;
  const segs=daySegs(); const i=segIndexAt(t); const s=segs[i];
  if(t<=s.start || t>=s.end) return false;                 // already a boundary
  segs.splice(i,1,
    {start:s.start, end:t,   ev:s.ev?Object.assign({},s.ev):null},
    {start:t,       end:s.end, ev:s.ev?Object.assign({},s.ev):null});
  return true;
}
function moveBoundary(bi, t){
  const segs=daySegs();
  t = Math.round(t/SNAP_MIN)*SNAP_MIN;
  const lo = segs[bi-1].start + SNAP_MIN, hi = segs[bi].end - SNAP_MIN;
  t = clamp(t, lo, hi);
  segs[bi-1].end = t; segs[bi].start = t;
  return t;
}
function deleteBoundary(bi){
  const segs=daySegs(); const a=segs[bi-1], b=segs[bi];
  let ev = null;
  if(a.ev && b.ev) ev = ((a.end-a.start) >= (b.end-b.start)) ? a.ev : b.ev;  // longer event wins
  else ev = a.ev || b.ev;                                                     // event fills the interval
  segs.splice(bi-1, 2, {start:a.start, end:b.end, ev});
}

/* ---------- storage ---------- */
function save(){
  try{
    localStorage.setItem('ts_state', JSON.stringify({
      segsByDay: state.segsByDay,
      winStart: state.winStart, winEnd: state.winEnd,
      minimal: state.minimal
    }));
  }catch(e){}
}
function migrate(s){
  const out = {};
  const aDays = s.anchorsByDay||{}, eDays = s.eventsByDay||{};
  const keys = new Set([...Object.keys(aDays), ...Object.keys(eDays)]);
  keys.forEach(k=>{
    const a = (aDays[k]||[]).slice().sort((x,y)=>x-y);
    const bounds = [0, ...a, DAY_MIN];
    const ev = eDays[k]||{};
    const segs = [];
    for(let i=0;i<bounds.length-1;i++) segs.push({start:bounds[i], end:bounds[i+1], ev:ev[bounds[i]]||null});
    out[k] = segs;
  });
  return out;
}
function load(){
  try{
    const s = JSON.parse(localStorage.getItem('ts_state')||'{}');
    state.segsByDay = s.segsByDay || migrate(s);
    if(typeof s.winStart==='number') state.winStart = s.winStart;
    if(typeof s.winEnd==='number') state.winEnd = s.winEnd;
    if(typeof s.minimal==='boolean') state.minimal = s.minimal;
  }catch(e){}
}

/* ---------- geometry ---------- */
let W=0,H=0,dpr=1,originX=0,originY=0;
let barTop=0, barBot=0, barX=0, barW=20;
function layout(){
  dpr = window.devicePixelRatio || 1;
  const st = document.getElementById('stage');
  const r0 = st.getBoundingClientRect();           // the 100dvh box defines the real visible area
  W = r0.width; H = r0.height;
  originX = r0.left; originY = r0.top;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  barX   = W*0.30 - 16;
  barW   = 20;
  // date header: center it in the space to the right of the bar
  const dh = document.getElementById('dateHead');
  dh.style.left  = (barX + barW + 8) + 'px';
  dh.style.right = '0px';
  // anchor the bar below the rendered header (stage-local coords)
  const r = dh.getBoundingClientRect();
  barTop = Math.max((r.bottom-originY) + 14, (r.top-originY) + 56);
  barBot = H - 74;
}
window.addEventListener('resize', ()=>{ layout(); });
window.addEventListener('orientationchange', ()=> setTimeout(layout, 150));
if(window.visualViewport){ window.visualViewport.addEventListener('resize', layout); }

function timeToY(t){ return barTop + (t-state.winStart)/(state.winEnd-state.winStart)*(barBot-barTop); }
function yToTime(y){ return state.winStart + (y-barTop)/(barBot-barTop)*(state.winEnd-state.winStart); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

function currentMinutes(){
  const n = new Date();
  return n.getHours()*60 + n.getMinutes() + n.getSeconds()/60;
}
function effSliceTime(){
  if(state.detached && state.sliceTime!=null) return state.sliceTime;
  return isToday() ? currentMinutes() : (state.sliceTime!=null?state.sliceTime:DAY_MIN/2);
}

/* ---------- formatting ---------- */
function fmt12(mins){
  let m = ((Math.round(mins)%DAY_MIN)+DAY_MIN)%DAY_MIN;
  const h = Math.floor(m/60), mm = m%60;
  const ap = h<12?'AM':'PM'; let h12 = h%12; if(h12===0) h12=12;
  return { hm: h12+':'+String(mm).padStart(2,'0'), ap };
}
function fmtCornerLine(mins){
  const p = fmt12(mins);
  return p.hm+' '+p.ap;
}
function fmtDate(d){
  const wd = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
  const mo = d.toLocaleDateString('en-US',{month:'short'}).toUpperCase();
  return wd+' '+mo+' '+d.getDate();
}

/* ---------- drawing ---------- */
function roundRect(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  const segs = daySegs();

  // pills (clip to bar region)
  ctx.save();
  ctx.beginPath();
  ctx.rect(barX-barW, barTop-30, barW*2, (barBot-barTop)+60);
  ctx.clip();
  for(const sg of segs){
    let y0=timeToY(sg.start), y1=timeToY(sg.end);
    if(y1<barTop-30 || y0>barBot+30) continue;
    const gap = 3;
    const top = y0+gap, h = (y1-gap)-(top);
    if(h<=0) continue;
    ctx.fillStyle = sg.ev ? (CONFIG.divisions[sg.ev.divIdx] ? CONFIG.divisions[sg.ev.divIdx].color : COLORS.ghost) : COLORS.ghost;
    roundRect(barX-barW/2, top, barW, h, barW/2);
    ctx.fill();
  }
  ctx.restore();

  // event labels next to the bar — hidden in minimal mode
  if(!state.minimal){
    ctx.font = '300 13px "IBM Plex Mono",monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = COLORS.label;
    for(const sg of segs){
      if(!sg.ev) continue;
      const y0=Math.max(timeToY(sg.start),barTop), y1=Math.min(timeToY(sg.end),barBot);
      if(y1-y0 < 16) continue;
      const lbl = sg.ev.sub || sg.ev.cat || sg.ev.title || '';
      if(lbl) ctx.fillText(lbl, barX+barW, (y0+y1)/2+4);
    }
  }

  // ticks (hour marks) — hidden in minimal mode
  if(!state.minimal){
    const startH = Math.ceil(state.winStart/60);
    const endH   = Math.floor(state.winEnd/60);
    for(let h=startH;h<=endH;h++){
      const y = timeToY(h*60);
      if(y<barTop-1||y>barBot+1) continue;
      const major = (h%6===0);
      ctx.strokeStyle = major?COLORS.tick:COLORS.tickMin;
      ctx.lineWidth = major?2:1.5;
      const len = major?18:12;
      ctx.beginPath();
      ctx.moveTo(W*0.09, y);
      ctx.lineTo(W*0.09+len, y);
      ctx.stroke();
      // hour number at the 3-hour marks (3,6,9,12,3,6,9) — skip midnight ends
      if(h%3===0 && h!==0 && h!==24){
        let h12 = h%12; if(h12===0) h12=12;
        ctx.fillStyle = COLORS.tick;
        ctx.font = '300 13px "IBM Plex Mono",monospace';
        ctx.textAlign = 'left';
        ctx.fillText(String(h12), 16, y+4);
      }
    }
  }

  // corner time labels (top & bottom of bar) — single line, clear of the ticks
  if(!state.minimal){
    ctx.fillStyle = COLORS.label;
    ctx.font = '300 13px "IBM Plex Mono",monospace';
    ctx.textAlign = 'left';
    ctx.fillText(fmtCornerLine(state.winStart), 16, barTop-11);
    ctx.fillText(fmtCornerLine(state.winEnd),   16, barBot+21);
  }

  const slice = effSliceTime();
  const sliceY = clamp(timeToY(slice), barTop, barBot);
  const atNow = (!state.detached) || state.snappedNow;

  // time-line (current time) — only when the slice line is detached away from now
  if(state.detached && !state.snappedNow && isToday()){
    const ny = timeToY(currentMinutes());
    if(ny>=barTop && ny<=barBot){
      ctx.strokeStyle = COLORS.flame;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(barX-16, ny); ctx.lineTo(barX+16, ny); ctx.stroke();
      // current time, in the hash column, on an opaque frame that masks the ticks
      if(!state.minimal){
        ctx.font = '300 13px "IBM Plex Mono",monospace';
        ctx.textAlign = 'left';
        const txt = fmtCornerLine(currentMinutes());
        const tw = ctx.measureText(txt).width;
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(12, ny-9, tw+8, 18);
        ctx.fillStyle = COLORS.flame;
        ctx.fillText(txt, 16, ny+4);
      }
    }
  }

  // the slice cursor line (solid at now, dashed when detached elsewhere), 1px, clear of the hashes
  const flashing = (performance.now()-state.flashStart) < 1000;
  let lineColor = COLORS.slice;
  if(flashing){
    const ft = (performance.now()-state.flashStart)/1000;
    const k = ft<0.5 ? 1 : 1-((ft-0.5)/0.5);
    lineColor = mix(COLORS.slice, COLORS.red, k);
  }
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1;
  ctx.setLineDash(atNow ? [] : [7,7]);
  ctx.beginPath(); ctx.moveTo(hashRight(), sliceY); ctx.lineTo(W*0.97, sliceY); ctx.stroke();
  ctx.setLineDash([]);

  // drag dot — lingers ~2s after release; with a red X delete handle 60px to its right
  if(state.dragDot && performance.now() < state.dragDot.until){
    const dy = timeToY(state.dragDot.time);
    if(dy>=barTop && dy<=barBot){
      ctx.fillStyle = COLORS.red;
      ctx.beginPath(); ctx.arc(barX, dy, 6, 0, Math.PI*2); ctx.fill();
      // X
      const xc = barX+60, s=6;
      ctx.strokeStyle = COLORS.red; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(xc-s, dy-s); ctx.lineTo(xc+s, dy+s);
      ctx.moveTo(xc+s, dy-s); ctx.lineTo(xc-s, dy+s);
      ctx.stroke();
    }
  }

  // big time + small AM/PM + word; time digits and word same size, sharing one right edge
  const tp = fmt12(slice);
  const RE = W*0.90;
  ctx.fillStyle = COLORS.text;
  ctx.textAlign = 'right';
  ctx.font = '400 34px "IBM Plex Mono",monospace';
  ctx.fillText(tp.hm, RE, sliceY-10);
  const dotOn = state.dragDot && performance.now() < state.dragDot.until;
  ctx.fillText((state.dragging||dotOn)?'drag':'slice', RE, sliceY+30);
  ctx.textAlign = 'left';
  ctx.font = '400 12px "IBM Plex Mono",monospace';
  ctx.fillText(tp.ap, RE + 4, sliceY-24);
}

function mix(a,b,k){
  const pa=parseHex(a), pb=parseHex(b);
  const r=Math.round(pa[0]+(pb[0]-pa[0])*k);
  const g=Math.round(pa[1]+(pb[1]-pa[1])*k);
  const bl=Math.round(pa[2]+(pb[2]-pa[2])*k);
  return 'rgb('+r+','+g+','+bl+')';
}
function parseHex(h){
  if(h[0]==='#'){const n=parseInt(h.slice(1),16);return [(n>>16)&255,(n>>8)&255,n&255];}
  const m=h.match(/\d+/g); return [+m[0],+m[1],+m[2]];
}

/* ---------- snapping ---------- */
function nearestAnchor(t){
  const ty = timeToY(t);
  let best=null, bestPx=SNAP_PX;
  for(const c of anchorTimes()){
    const px = Math.abs(timeToY(c)-ty);
    if(px<bestPx){ bestPx=px; best=c; }
  }
  return best;
}

/* ---------- pointer / gestures ---------- */
const DRAG_OFFSET = 34;      // slice line sits above the finger so the word 'slice' is under it
const DOT_HOLD = 2000;       // ms the drag dot lingers after release
const pointers = new Map();
let gesture = null;          // 'drag' | 'anchordrag' | 'pinch' | 'scroll' | null
let downInfo = null;
let pinchStart = null;
let scrollStart = null;
let anchorIdx = -1;          // index of the anchor being dragged

function hashRight(){ return W*0.09 + 22; }   // right edge of the tick column
function onBar(x,y){ return x>=barX-barW && x<=barX+barW && y>=barTop && y<=barBot; }
function inHashZone(x,y){ return x < (barX - barW) && y >= barTop && y <= barBot; }
function resetGestures(){ pointers.clear(); downInfo=null; gesture=null; scrollStart=null; pinchStart=null; anchorIdx=-1; state.dragging=false; }

const stage = document.getElementById('stage');

function doScroll(ly){
  const span = state.winEnd - state.winStart;
  let ws = clamp(scrollStart.winStart - (ly - scrollStart.y)/(barBot-barTop)*span, 0, DAY_MIN-span);
  state.winStart = ws; state.winEnd = ws+span;
}
function dotActive(){ return state.dragDot && performance.now() < state.dragDot.until; }

stage.addEventListener('pointerdown', e=>{
  stage.setPointerCapture(e.pointerId);
  const x = e.clientX - originX, y = e.clientY - originY;
  pointers.set(e.pointerId, {x, y});

  if(pointers.size===2){
    const pts = [...pointers.values()];
    const dist = Math.abs(pts[0].y - pts[1].y) || 1;
    const midY = (pts[0].y + pts[1].y)/2;
    pinchStart = { dist, span: state.winEnd-state.winStart, midTime: yToTime(midY), midY };
    gesture = 'pinch'; state.dragging = false; downInfo = null; scrollStart = null;
    return;
  }

  // when the drag dot is showing: tap its red X to delete the anchor, or grab the dot to move it
  if(dotActive()){
    const dy = timeToY(state.dragDot.time);
    if(Math.hypot(x-(barX+60), y-dy) <= 22){
      const bi = boundaryNear(state.dragDot.time);
      if(bi>=1){ deleteBoundary(bi); state.dragDot=null; resetGestures(); save(); return; }
    }
    if(Math.hypot(x-barX, y-dy) <= 30){
      anchorIdx = boundaryNear(state.dragDot.time);
      if(anchorIdx>=1){ downInfo = { x, y, t:performance.now(), moved:false, mode:'anchor' }; gesture=null; return; }
    }
  }

  const sy = clamp(timeToY(effSliceTime()), barTop, barBot);
  const onSliceRow = Math.abs(y - sy) <= 44 && x > barX+barW;     // the line/text to the right of the bar
  const nowY = (state.detached && !state.snappedNow && isToday()) ? timeToY(currentMinutes()) : null;
  const onNowLine = nowY!=null && Math.abs(y - nowY) <= 18 && x < W*0.62;

  if(onNowLine){
    downInfo = { x, y, t:performance.now(), moved:false, mode:'nowline' };
    scrollStart = { y, winStart:state.winStart }; gesture = null;
  } else if(onSliceRow){
    downInfo = { x, y, t:performance.now(), moved:false, mode:'slice' }; gesture = null;
  } else if(onBar(x,y)){
    downInfo = { x, y, t:performance.now(), moved:false, mode:'bartap' };
    scrollStart = { y, winStart:state.winStart }; gesture = null;
  } else if(inHashZone(x,y)){
    downInfo = { x, y, t:performance.now(), moved:false, mode:'hashtap' };
    scrollStart = { y, winStart:state.winStart }; gesture = null;
  } else {
    gesture = 'scroll'; scrollStart = { y, winStart:state.winStart }; downInfo = null;
  }
}, {passive:false});

stage.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  const x = e.clientX - originX, y = e.clientY - originY;
  pointers.get(e.pointerId).x = x;
  pointers.get(e.pointerId).y = y;
  e.preventDefault();

  if(gesture==='pinch' && pointers.size>=2){
    const pts = [...pointers.values()];
    const dist = Math.abs(pts[0].y - pts[1].y) || 1;
    let span = clamp(pinchStart.span * (pinchStart.dist / dist), MIN_SPAN, DAY_MIN);
    const frac = (pinchStart.midY - barTop)/(barBot-barTop);
    let ws = clamp(pinchStart.midTime - frac*span, 0, DAY_MIN-span);
    state.winStart = ws; state.winEnd = ws+span;
    return;
  }

  if(gesture==='scroll' && scrollStart){ doScroll(y); return; }

  if(downInfo){
    const dist = Math.hypot(x-downInfo.x, y-downInfo.y);

    if(downInfo.mode==='nowline' || downInfo.mode==='bartap' || downInfo.mode==='hashtap'){
      if(!downInfo.moved && dist>6){ downInfo.moved=true; gesture='scroll'; }
      if(gesture==='scroll') doScroll(y);
      return;
    }

    if(downInfo.mode==='anchor'){
      if(!downInfo.moved && dist>6){ downInfo.moved=true; gesture='anchordrag'; state.dragging=true; }
      if(gesture==='anchordrag'){
        const t = moveBoundary(anchorIdx, yToTime(clamp(y, barTop, barBot)));
        state.detached = true; state.snappedNow = false; state.sliceTime = t;
        state.dragDot = { time: t, until: performance.now()+DOT_HOLD };
      }
      return;
    }

    // mode 'slice'
    if(!downInfo.moved && dist>6){ downInfo.moved=true; gesture='drag'; state.dragging=true; state.detached=true; }
    if(gesture==='drag'){
      const span = state.winEnd - state.winStart;
      const lineY = y - DRAG_OFFSET;       // keep the word 'slice' under the finger
      if(lineY < barTop){
        let ws = clamp(state.winStart - (barTop-lineY)*0.4*(span/(barBot-barTop)), 0, DAY_MIN-span);
        state.winStart = ws; state.winEnd = ws+span;
      } else if(lineY > barBot){
        let ws = clamp(state.winStart + (lineY-barBot)*0.4*(span/(barBot-barTop)), 0, DAY_MIN-span);
        state.winStart = ws; state.winEnd = ws+span;
      }
      const ay = clamp(lineY, barTop, barBot);
      const t = yToTime(ay);
      const nowM = isToday() ? currentMinutes() : null;
      if(nowM!=null && Math.abs(timeToY(nowM)-ay) <= SNAP_PX){
        state.snappedNow = true; state.sliceTime = nowM;
      } else {
        state.snappedNow = false;
        const snap = nearestAnchor(t);
        state.sliceTime = (snap!=null) ? snap : Math.round(t/SNAP_MIN)*SNAP_MIN;
      }
      state.sliceTime = clamp(state.sliceTime, 0, DAY_MIN);
      const onA = nearestAnchor(state.sliceTime);
      if(onA!=null && Math.abs(onA-state.sliceTime)<0.6 && !state.snappedNow){
        state.dragDot = { time: onA, until: performance.now()+DOT_HOLD };
      }
    }
  }
}, {passive:false});

function endPointer(e){
  if(pointers.has(e.pointerId)) pointers.delete(e.pointerId);

  if(gesture==='pinch'){
    if(pointers.size<2){
      gesture=null; pinchStart=null;
      const sy = timeToY(effSliceTime());
      if(sy<barTop || sy>barBot){
        const span = state.winEnd-state.winStart;
        let ws = clamp(effSliceTime()-span/2, 0, DAY_MIN-span);
        state.winStart=ws; state.winEnd=ws+span;
      }
      save();
    }
    return;
  }

  if(gesture==='scroll'){ save(); state.dragging=false; gesture=null; downInfo=null; scrollStart=null; return; }

  if(gesture==='anchordrag'){
    if(state.dragDot) state.dragDot.until = performance.now()+DOT_HOLD;
    save(); state.dragging=false; gesture=null; downInfo=null; anchorIdx=-1; return;
  }

  if(downInfo && !downInfo.moved){
    if(downInfo.mode==='nowline'){
      state.detached=false; state.sliceTime=null; state.snappedNow=false;   // tap time-line → reattach
    } else if(downInfo.mode==='bartap'){
      openEditorForTime(clamp(yToTime(clamp(downInfo.y,barTop,barBot)),0,DAY_MIN));   // tap bar → edit interval
    } else if(downInfo.mode==='hashtap'){
      const yy = clamp(downInfo.y, barTop, barBot);
      const nowM = isToday() ? currentMinutes() : null;
      if(nowM!=null && Math.abs(timeToY(nowM)-yy) <= SNAP_PX){
        state.detached=false; state.sliceTime=null; state.snappedNow=false; // near now → reattach
      } else {
        state.detached=true; state.snappedNow=false;
        state.sliceTime = clamp(Math.round(yToTime(yy)/SNAP_MIN)*SNAP_MIN, 0, DAY_MIN);
      }
    } else if(downInfo.mode==='slice'){
      doSlice();
    }
  }

  if(gesture==='drag'){
    if(state.snappedNow){ state.detached=false; state.sliceTime=null; }              // released at now → follow now
    else if(state.dragDot){ state.dragDot.until = performance.now()+DOT_HOLD; }      // linger so dot is grabbable
    state.snappedNow=false;
    save();
  }

  state.dragging=false; gesture=null; downInfo=null; scrollStart=null;
}
stage.addEventListener('pointerup', endPointer, {passive:false});
stage.addEventListener('pointercancel', endPointer, {passive:false});

function doSlice(){
  const t = Math.round(effSliceTime()/SNAP_MIN)*SNAP_MIN;
  state.flashStart = performance.now();
  if(sliceAt(t)) save();
}

/* ---------- date nav ---------- */
function setDate(d){
  state.date = d;
  state.detached = false; state.sliceTime = null;
  updateDateLabel();
  save();
}
function updateDateLabel(){ document.getElementById('dateLabel').textContent = fmtDate(state.date); }
document.getElementById('prevDay').addEventListener('click', ()=>{ const d=new Date(state.date); d.setDate(d.getDate()-1); setDate(d); });
document.getElementById('nextDay').addEventListener('click', ()=>{ const d=new Date(state.date); d.setDate(d.getDate()+1); setDate(d); });

/* ---------- settings sheet ---------- */
const sheet = document.getElementById('sheet');
document.getElementById('hamb').addEventListener('click', ()=>{ syncToggles(); sheet.classList.add('open'); });
document.getElementById('sheetClose').addEventListener('click', ()=> sheet.classList.remove('open'));
function syncToggles(){ document.getElementById('tglMinimal').classList.toggle('on', state.minimal); }
document.getElementById('tglMinimal').addEventListener('click', ()=>{ state.minimal=!state.minimal; syncToggles(); save(); });
document.getElementById('btnReset').addEventListener('click', ()=>{ state.detached=false; state.sliceTime=null; state.snappedNow=false; sheet.classList.remove('open'); });
document.getElementById('btnClear').addEventListener('click', ()=>{ state.segsByDay[dayKey(state.date)]=[{start:0,end:DAY_MIN,ev:null}]; save(); sheet.classList.remove('open'); });

/* ---------- zoom control (desktop) ---------- */
function zoomBy(f){
  const center = (state.winStart+state.winEnd)/2;
  let span = clamp((state.winEnd-state.winStart)*f, MIN_SPAN, DAY_MIN);
  let ws = clamp(center - span/2, 0, DAY_MIN-span);
  state.winStart = ws; state.winEnd = ws+span; save();
}
document.getElementById('zoomIn').addEventListener('click', ()=> zoomBy(0.7));
document.getElementById('zoomOut').addEventListener('click', ()=> zoomBy(1/0.7));

/* ---------- event editor ---------- */
const ed = id=>document.getElementById(id);
let edSegIdx=-1;

function fmtRange(s,e){ const a=fmt12(s), b=fmt12(e); return a.hm+' '+a.ap+' – '+b.hm+' '+b.ap; }
function populateDivs(sel){
  const s=ed('edDiv'); s.innerHTML='';
  CONFIG.divisions.forEach((d,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=d.name; s.appendChild(o); });
  s.value = sel;
}
function populateCats(divIdx, selCat){
  const s=ed('edCat'); s.innerHTML='';
  const b=document.createElement('option'); b.value=''; b.textContent='—'; s.appendChild(b);
  const tree = CONFIG.divisions[divIdx] ? CONFIG.divisions[divIdx].tree : [];
  tree.forEach(c=>{ const o=document.createElement('option'); o.value=c.cat; o.textContent=c.cat; s.appendChild(o); });
  s.value = selCat||'';
}
function populateSubs(divIdx, cat, selSub){
  const s=ed('edSub'); s.innerHTML='';
  const b=document.createElement('option'); b.value=''; b.textContent='—'; s.appendChild(b);
  const tree = CONFIG.divisions[divIdx] ? CONFIG.divisions[divIdx].tree : [];
  const c = tree.find(x=>x.cat===cat);
  (c?c.subs:[]).forEach(sub=>{ const o=document.createElement('option'); o.value=sub; o.textContent=sub; s.appendChild(o); });
  s.value = selSub||'';
}
function updatePreview(){
  const divIdx=+ed('edDiv').value, cat=ed('edCat').value, sub=ed('edSub').value, note=ed('edNote').value;
  const tag = cat ? buildTag(divIdx, cat, sub) : '';
  ed('edPreview').textContent = (tag||'(no category)') + (note?('\n'+note):'');
}
function openEditorForTime(t){
  resetGestures();
  edSegIdx = segIndexAt(t);
  const seg = daySegs()[edSegIdx];
  const ev = seg.ev || {};
  const divIdx = (ev.divIdx!=null) ? ev.divIdx : 0;
  ed('edTime').textContent = fmtRange(seg.start, seg.end);
  ed('edTitle').value = ev.title || '';
  populateDivs(divIdx);
  populateCats(divIdx, ev.cat);
  populateSubs(divIdx, ev.cat, ev.sub);
  ed('edNote').value = ev.note || '';
  ed('edDelete').style.visibility = seg.ev ? 'visible' : 'hidden';
  updatePreview();
  ed('editor').classList.add('open');
  ed('editorBack').classList.add('open');
}
function closeEditor(){ ed('editor').classList.remove('open'); ed('editorBack').classList.remove('open'); }

ed('edDiv').addEventListener('change', ()=>{ const d=+ed('edDiv').value; populateCats(d,''); populateSubs(d,'',''); updatePreview(); });
ed('edCat').addEventListener('change', ()=>{ const d=+ed('edDiv').value; populateSubs(d, ed('edCat').value, ''); updatePreview(); });
ed('edSub').addEventListener('change', updatePreview);
ed('edNote').addEventListener('input', updatePreview);
ed('edClose').addEventListener('click', closeEditor);
ed('editorBack').addEventListener('click', closeEditor);
ed('edSave').addEventListener('click', ()=>{
  const segs = daySegs();
  if(edSegIdx<0 || edSegIdx>=segs.length) return closeEditor();
  segs[edSegIdx].ev = {
    title: ed('edTitle').value.trim(),
    divIdx: +ed('edDiv').value,
    cat: ed('edCat').value,
    sub: ed('edSub').value,
    note: ed('edNote').value
  };
  save(); closeEditor();
});
ed('edDelete').addEventListener('click', ()=>{ const segs=daySegs(); if(edSegIdx>=0 && edSegIdx<segs.length) segs[edSegIdx].ev=null; save(); closeEditor(); });

/* ---------- boot ---------- */
load();
layout();
updateDateLabel();
document.body.style.background = COLORS.bg;
setTimeout(layout, 300);
(function loop(){ draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
